<!DOCTYPE html>
<html>
<head>
    <title>Bible Trivia - Riverview</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c2c, #2a4a35);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game-container {
            text-align: center;
            padding: 2rem;
            background: rgba(255,255,240,0.95);
            border-radius: 20px;
            border: 3px solid #d4af37;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .score {
            font-size: 1.2rem;
            margin: 1rem 0;
            color: #2c5e2e;
            font-weight: bold;
        }
        .question {
            font-size: 1.3rem;
            margin: 1.5rem 0;
            color: #1e3c2c;
            font-weight: bold;
        }
        .options {
            display: grid;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .option-btn {
            background: #2c5e2e;
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #1e3c2c;
            transform: scale(1.02);
        }
        .option-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .feedback {
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: bold;
        }
        .correct {
            background: #d4edda;
            color: #155724;
        }
        .wrong {
            background: #f8d7da;
            color: #721c24;
        }
        .next-btn {
            background: #d4af37;
            color: #1e3c2c;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 1rem;
        }
        .next-btn:hover {
            background: #b8941e;
        }
        .reset-btn {
            background: #6c757d;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            margin-left: 0.5rem;
        }
        .church-info {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px solid #d4af37;
            font-size: 0.8rem;
            color: #2c5e2e;
        }
        .back-link {
            display: inline-block;
            margin-top: 0.8rem;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }
        .final-score {
            font-size: 1.5rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>📖 BIBLE TRIVIA 📖</h1>
        <div class="score">Score: <span id="score">0</span> / <span id="total">0</span></div>
        
        <div id="gameArea">
            <div class="question" id="question">Loading...</div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <button class="next-btn" id="nextBtn" style="display:none;">Next Question →</button>
        </div>
        
        <button class="reset-btn" id="resetBtn">Restart Game</button>
        
        <div class="church-info">
            <p>✝️ Riverview Southern Baptist Church ✝️</p>
            <p>📍 410 Beardsley Ave, Bakersfield, CA</p>
            <p>⏰ Sundays at 9:30 AM | 📞 (661) 333-2250</p>
        </div>
        <a href="index.html" class="back-link">← Back to Church Site</a>
    </div>

    <script>
        const questions = [
            {
                text: "Who built the ark?",
                options: ["Moses", "Noah", "Abraham", "David"],
                correct: 1
            },
            {
                text: "What city was Jesus born in?",
                options: ["Nazareth", "Jerusalem", "Bethlehem", "Capernaum"],
                correct: 2
            },
            {
                text: "How many days and nights did it rain during the flood?",
                options: ["7", "30", "40", "100"],
                correct: 2
            },
            {
                text: "Who was thrown into the lions' den?",
                options: ["Daniel", "David", "Joseph", "Jonah"],
                correct: 0
            },
            {
                text: "What is the first book of the Bible?",
                options: ["Exodus", "Leviticus", "Numbers", "Genesis"],
                correct: 3
            },
            {
                text: "Who defeated Goliath with a sling and stone?",
                options: ["Samson", "David", "Solomon", "Joshua"],
                correct: 1
            },
            {
                text: "What fish swallowed Jonah?",
                options: ["Shark", "Whale", "Big fish", "Dolphin"],
                correct: 2
            },
            {
                text: "Who was the first man?",
                options: ["Adam", "Eve", "Cain", "Abel"],
                correct: 0
            },
            {
                text: "What did Jesus turn into wine at the wedding in Cana?",
                options: ["Oil", "Water", "Milk", "Grape juice"],
                correct: 1
            },
            {
                text: "How many disciples did Jesus have?",
                options: ["10", "11", "12", "13"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        
        const totalQuestions = questions.length;
        document.getElementById('total').innerText = totalQuestions;
        
        function loadQuestion() {
            if (currentQuestion >= totalQuestions) {
                endGame();
                return;
            }
            
            answered = false;
            const q = questions[currentQuestion];
            document.getElementById('question').innerText = q.text;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('nextBtn').style.display = 'none';
        }
        
        function checkAnswer(selected) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestion];
            const isCorrect = (selected === q.correct);
            
            if (isCorrect) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('feedback').innerHTML = '✅ Correct! ' + getExplanation(currentQuestion, true);
                document.getElementById('feedback').className = 'feedback correct';
            } else {
                const correctAnswer = q.options[q.correct];
                document.getElementById('feedback').innerHTML = '❌ Wrong! The correct answer was: ' + correctAnswer + '. ' + getExplanation(currentQuestion, false);
                document.getElementById('feedback').className = 'feedback wrong';
            }
            
            // Disable all option buttons
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
            
            document.getElementById('nextBtn').style.display = 'inline-block';
        }
        
        function getExplanation(questionIndex, wasCorrect) {
            const explanations = [
                "God told Noah to build the ark to save his family and the animals.",
                "Micah 5:2 prophesied the Messiah would be born in Bethlehem.",
                "Genesis 7:12 says it rained for 40 days and 40 nights.",
                "Daniel trusted God and was protected in the lions' den.",
                "Genesis is the first book of the Bible, meaning 'beginnings'.",
                "1 Samuel 17 tells how young David defeated Goliath with faith in God.",
                "Jonah 1:17 says God prepared a great fish to swallow Jonah.",
                "God created Adam from the dust of the ground (Genesis 2:7).",
                "John 2:1-11 records Jesus's first miracle at the wedding in Cana.",
                "Jesus chose twelve disciples to follow Him and learn from Him."
            ];
            return explanations[questionIndex] || "";
        }
        
        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
        }
        
        function endGame() {
            const gameArea = document.getElementById('gameArea');
            const percentage = Math.round((score / totalQuestions) * 100);
            let message = '';
            if (percentage === 100) message = "Perfect score! You're a Bible scholar! 🙌";
            else if (percentage >= 80) message = "Great job! You know your Bible well! 📖";
            else if (percentage >= 60) message = "Good effort! Keep reading God's Word! ✝️";
            else message = "Nice try! The more you read the Bible, the more you'll learn! 🌱";
            
            gameArea.innerHTML = `
                <div class="final-score">
                    🎉 Game Complete! 🎉<br>
                    Your final score: ${score} / ${totalQuestions} (${percentage}%)
                </div>
                <div style="margin: 1rem 0; font-size: 1.1rem;">${message}</div>
                <button class="next-btn" onclick="location.reload()">Play Again</button>
            `;
        }
        
        document.getElementById('nextBtn').onclick = nextQuestion;
        document.getElementById('resetBtn').onclick = () => {
            currentQuestion = 0;
            score = 0;
            answered = false;
            document.getElementById('score').innerText = score;
            loadQuestion();
        };
        
        loadQuestion();
    </script>
<script src="hidden-games.js"></script>
</body>
</html>
